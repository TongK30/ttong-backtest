<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập — SMC Trading</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #070d1a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background orbs */
        .bg-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.22;
            animation: floatOrb 9s ease-in-out infinite;
        }

        .orb-1 {
            width: 420px;
            height: 420px;
            background: #3b82f6;
            top: -120px;
            left: -120px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 360px;
            height: 360px;
            background: #8b5cf6;
            bottom: -100px;
            right: -100px;
            animation-delay: 3s;
        }

        .orb-3 {
            width: 260px;
            height: 260px;
            background: #06b6d4;
            top: 55%;
            left: 55%;
            animation-delay: 6s;
        }

        @keyframes floatOrb {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(18px, -18px);
            }
        }

        /* Card */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(15, 23, 42, 0.88);
            backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 0 40px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(255, 255, 255, 0.04);
            animation: slideUp 0.5s cubic-bezier(.22, 1, .36, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(28px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ======= BEAR CHARACTER ======= */
        .bear-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
            margin-top: -52px;
        }

        .bear {
            position: relative;
            width: 110px;
            height: 110px;
            filter: drop-shadow(0 12px 32px rgba(59, 130, 246, 0.35));
        }

        /* Body/face circle */
        .bear__face {
            width: 110px;
            height: 110px;
            background: radial-gradient(circle at 40% 35%, #78c5d5, #4aa8c0 60%, #2d8ea5);
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.15);
            position: relative;
            overflow: hidden;
        }

        /* Ears */
        .bear__ear {
            position: absolute;
            width: 32px;
            height: 32px;
            background: #4aa8c0;
            border-radius: 50%;
            top: 2px;
            border: 3px solid rgba(255, 255, 255, 0.12);
        }

        .bear__ear--left {
            left: 6px;
        }

        .bear__ear--right {
            right: 6px;
        }

        .bear__ear::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: #c8eaf0;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Fur top */
        .bear__fur {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 40px;
            background: #e8f6fa;
            border-radius: 50%;
            border-bottom: none;
        }

        /* Eyes */
        .bear__eyes {
            position: absolute;
            top: 36px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 18px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .bear__eye {
            width: 14px;
            height: 14px;
            background: #1a2a3a;
            border-radius: 50%;
            position: relative;
            animation: blink 4s infinite;
        }

        .bear__eye::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 5px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
        }

        @keyframes blink {

            0%,
            96%,
            100% {
                transform: scaleY(1);
            }

            98% {
                transform: scaleY(0.1);
            }
        }

        /* Nose */
        .bear__nose {
            position: absolute;
            top: 52px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 8px;
            background: #1a2a3a;
            border-radius: 50% 50% 40% 40%;
        }

        /* Mouth */
        .bear__mouth {
            position: absolute;
            top: 62px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 10px;
            border-bottom: 3px solid #1a2a3a;
            border-radius: 0 0 50% 50%;
            transition: all 0.3s ease;
        }

        /* Hands — hide by default, slide up when covering */
        .bear__hands {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            transition: transform 0.45s cubic-bezier(.34, 1.56, .64, 1), opacity 0.3s;
            opacity: 0;
            pointer-events: none;
        }

        .bear__hand {
            width: 38px;
            height: 52px;
            background: radial-gradient(circle at 50% 30%, #78c5d5, #4aa8c0);
            border-radius: 20px 20px 14px 14px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            position: relative;
        }

        /* Fingers */
        .bear__hand::before,
        .bear__hand::after {
            content: '';
            position: absolute;
            top: -10px;
            width: 14px;
            height: 18px;
            background: #4aa8c0;
            border-radius: 50% 50% 20% 20%;
            border: 2px solid rgba(255, 255, 255, 0.12);
        }

        .bear__hand--left::before {
            left: 0px;
        }

        .bear__hand--left::after {
            left: 14px;
        }

        .bear__hand--right::before {
            left: 10px;
        }

        .bear__hand--right::after {
            left: 24px;
        }

        /* PEEKING — hands up but eyes still show above fingers */
        .bear--peek .bear__hands {
            opacity: 1;
            transform: translateX(-50%) translateY(-72px);
        }

        .bear--peek .bear__eye {
            animation: none;
            transform: scaleY(0.6);
        }

        .bear--peek .bear__mouth {
            width: 14px;
            border-color: #2d4a5a;
        }

        /* COVERING — hands fully cover eyes */
        .bear--cover .bear__hands {
            opacity: 1;
            transform: translateX(-50%) translateY(-60px);
        }

        .bear--cover .bear__eyes {
            opacity: 0;
        }

        .bear--cover .bear__mouth {
            width: 10px;
            top: 66px;
            border-radius: 50%;
            border-left: 3px solid #1a2a3a;
            border-right: 3px solid #1a2a3a;
            border-bottom: none;
            height: 6px;
        }

        .bear--cover .bear__eye {
            animation: none;
        }

        /* Card top spacer */
        .card-head {
            padding-top: 72px;
            text-align: center;
            margin-bottom: 8px;
        }

        .card-head h2 {
            font-size: 22px;
            font-weight: 800;
            color: #f1f5f9;
        }

        .card-head p {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }

        .logo-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.35);
        }

        .logo-text {
            font-size: 14px;
            font-weight: 800;
            color: #f1f5f9;
        }

        .logo-sub {
            font-size: 10px;
            color: #475569;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.07), transparent);
            margin: 20px 0;
        }

        /* Fields */
        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 6px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i.ico-left {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
            font-size: 14px;
            pointer-events: none;
            transition: color .2s;
        }

        .field input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #f1f5f9;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all .2s;
        }

        .field input:focus {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.06);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
        }

        .field input:focus+.ico-left {
            color: #3b82f6;
        }

        .field input::placeholder {
            color: #334155;
        }

        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #475569;
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            transition: color .2s;
        }

        .toggle-pw:hover {
            color: #94a3b8;
        }

        /* Error */
        .error-box {
            display: none;
            background: rgba(239, 68, 68, .10);
            border: 1px solid rgba(239, 68, 68, .25);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            color: #fca5a5;
            margin-bottom: 14px;
            align-items: center;
            gap: 8px;
        }

        .error-box.show {
            display: flex;
        }

        /* Button */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
            margin-top: 6px;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 12px 32px rgba(59, 130, 246, 0.4);
        }

        .btn-login:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: .6;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin .6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .card-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 11px;
            color: #1e293b;
        }

        @media (max-width:480px) {
            .card {
                padding: 0 20px 32px;
                max-width: 100%;
                border-radius: 0;
                min-height: 100dvh;
                justify-content: center;
                display: flex;
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="card">
        <!-- Bear mascot — sits on top edge of card -->
        <div class="bear-wrap">
            <div class="bear" id="bear">
                <!-- Ears (behind face) -->
                <div class="bear__ear bear__ear--left"></div>
                <div class="bear__ear bear__ear--right"></div>
                <!-- Face -->
                <div class="bear__face">
                    <div class="bear__fur"></div>
                    <div class="bear__eyes">
                        <div class="bear__eye"></div>
                        <div class="bear__eye"></div>
                    </div>
                    <div class="bear__nose"></div>
                    <div class="bear__mouth"></div>
                    <!-- Hands (slide up over eyes) -->
                    <div class="bear__hands">
                        <div class="bear__hand bear__hand--left"></div>
                        <div class="bear__hand bear__hand--right"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-head">
            <div class="logo-badge">
                <div class="logo-icon">⚡</div>
                <div>
                    <div class="logo-text">Minh Trị Duy Tân</div>
                    <div class="logo-sub">Smart Money Concepts</div>
                </div>
            </div>
            <h2>Đăng nhập</h2>
            <p>Vui lòng nhập thông tin để tiếp tục</p>
        </div>

        <div class="divider"></div>

        <div class="error-box" id="errorBox">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="errorMsg">Tên đăng nhập hoặc mật khẩu không đúng.</span>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="field">
                <label>Tên đăng nhập</label>
                <div class="input-wrap">
                    <input type="text" id="username" placeholder="Nhập tên đăng nhập..." autocomplete="username"
                        required>
                    <i class="fa-solid fa-user ico-left"></i>
                </div>
            </div>

            <div class="field">
                <label>Mật khẩu</label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="Nhập mật khẩu..." autocomplete="current-password"
                        required>
                    <i class="fa-solid fa-lock ico-left"></i>
                    <button type="button" class="toggle-pw" onclick="togglePw()" tabindex="-1">
                        <i class="fa-solid fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login" id="btnLogin">
                <i class="fa-solid fa-right-to-bracket"></i> Đăng nhập
            </button>
        </form>

        <div class="card-footer">SMC Trading Journal Pro &copy; 2026</div>
    </div>

    <script>
        const API_PRIMARY = "https://script.google.com/macros/s/AKfycbxL8WrU5YfmRA77dD8TnoFXKCkr-VmE4ttZYVvjA_uS9nXF5qtdx5d7H7Hj0EKujvYlMA/exec";
        const API_SECONDARY = "https://script.google.com/macros/s/AKfycbz4wW8RLRipmtqbViIRXOxrdeV9SyPSmeaDE_4FM1OZt0ABxLET4Ja90P7rZKzCsAFvgw/exec";
        const SESSION_KEY = 'smc_auth';
        const SESSION_TTL = 8 * 60 * 60 * 1000;

        // Nếu đã đăng nhập → về trang chính
        (function () {
            try {
                const raw = localStorage.getItem(SESSION_KEY);
                if (raw) {
                    const s = JSON.parse(raw);
                    if (Date.now() < s.exp) {
                        const params = new URLSearchParams(window.location.search);
                        window.location.replace(params.get('redirect') || './index.html');
                    } else {
                        localStorage.removeItem(SESSION_KEY);
                    }
                }
            } catch { }
        })();

        /* ===== BEAR ANIMATION ===== */
        const bear = document.getElementById('bear');
        const pwInput = document.getElementById('password');

        pwInput.addEventListener('focus', () => {
            if (pwInput.type === 'password') coverEyes();
        });
        pwInput.addEventListener('blur', () => {
            openEyes();
        });
        pwInput.addEventListener('input', () => {
            if (pwInput.type === 'password') coverEyes();
            else peekEyes();
        });

        function coverEyes() {
            bear.classList.remove('bear--peek');
            bear.classList.add('bear--cover');
        }
        function peekEyes() {
            bear.classList.remove('bear--cover');
            bear.classList.add('bear--peek');
        }
        function openEyes() {
            bear.classList.remove('bear--cover', 'bear--peek');
        }

        /* ===== PASSWORD TOGGLE ===== */
        function togglePw() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-solid fa-eye-slash';
                if (document.activeElement === input) peekEyes();
            } else {
                input.type = 'password';
                icon.className = 'fa-solid fa-eye';
                if (document.activeElement === input) coverEyes();
            }
        }

        /* ===== UI HELPERS ===== */
        function showError(msg) {
            const box = document.getElementById('errorBox');
            document.getElementById('errorMsg').textContent = msg;
            box.classList.add('show');
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        }
        function hideError() {
            document.getElementById('errorBox').classList.remove('show');
        }
        function setLoading(on) {
            const btn = document.getElementById('btnLogin');
            btn.disabled = on;
            btn.innerHTML = on
                ? '<div class="spinner"></div> Đang xác thực...'
                : '<i class="fa-solid fa-right-to-bracket"></i> Đăng nhập';
        }

        function getField(row, ...keys) {
            for (const k of Object.keys(row)) {
                const kNorm = k.toLowerCase().trim().replace(/\s+/g, '');
                for (const key of keys) {
                    if (kNorm === key.toLowerCase()) return String(row[k] ?? '').trim();
                }
            }
            return '';
        }

        async function fetchAccounts() {
            const endpoints = [
                `${API_PRIMARY}?mode=api&sheet=Account`,
                `${API_SECONDARY}?mode=api&sheet=Account`,
                `${API_PRIMARY}?mode=api&sheet=account`,
                `${API_SECONDARY}?mode=api&sheet=account`,
            ];
            for (const url of endpoints) {
                try {
                    const r = await fetch(url);
                    const json = await r.json();
                    const data = Array.isArray(json) ? json : (json?.data ?? []);
                    if (data.length > 0) return data;
                } catch { }
            }
            throw new Error('Không thể kết nối tới máy chủ. Vui lòng thử lại.');
        }

        async function handleLogin(e) {
            e.preventDefault();
            hideError();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) { showError('Vui lòng nhập đầy đủ thông tin.'); return; }

            setLoading(true);
            try {
                const accounts = await fetchAccounts();
                const USER_KEYS = ['username', 'user', 'ten', 'name', 'taikhoan', 'account', 'email'];
                const PASS_KEYS = ['password', 'pass', 'matkhau', 'mk', 'pwd', 'secret'];
                const matched = accounts.find(row => {
                    const u = getField(row, ...USER_KEYS);
                    const p = getField(row, ...PASS_KEYS);
                    return u.toLowerCase() === username.toLowerCase() && p === password;
                });
                if (!matched) { showError('Tên đăng nhập hoặc mật khẩu không đúng.'); setLoading(false); return; }
                const session = { user: getField(matched, ...USER_KEYS), exp: Date.now() + SESSION_TTL, t: Date.now() };
                localStorage.setItem(SESSION_KEY, JSON.stringify(session));
                const params = new URLSearchParams(window.location.search);
                window.location.replace(params.get('redirect') || './index.html');
            } catch (err) {
                showError(err.message || 'Có lỗi xảy ra. Vui lòng thử lại.');
                setLoading(false);
            }
        }

        document.getElementById('username').addEventListener('input', hideError);
        document.getElementById('password').addEventListener('input', hideError);
    </script>
</body>

</html>
